name: Deploy Angular (Dev)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hi-app   # your Angular folder

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: npm run build -- --configuration production

      - run: npm install -g firebase-tools

      - run: firebase deploy --only hosting --project learn-ci-cd-a4ce3 --token ${{ secrets.FIREBASE_TOKEN }}
